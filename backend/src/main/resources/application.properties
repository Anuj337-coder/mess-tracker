# ===== FoodConnect API — Application Properties =====

# Server
server.port=8080

# ===== MySQL Database =====
# ⚠️  IMPORTANT: Change the password below to YOUR MySQL root password
# If you don't have a password set, leave it empty: spring.datasource.password=
spring.datasource.url=jdbc:mysql://localhost:3306/foodconnect?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=Anuj@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== JWT Config =====
app.jwt.secret=FoodConnect2025SuperSecretKeyForJWT1234567890
app.jwt.expiration=86400000

# ===== Email (Spring Mail) — OPTIONAL =====
# Email is disabled by default so the app starts without mail credentials.
# To enable: set spring.mail.enabled=true and fill in your Gmail App Password
spring.mail.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password_here
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=noreply@foodconnect.in

# ===== CORS =====
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500,null

# App name
spring.application.name=food-connect-api

# Logging
logging.level.com.foodconnect=INFO
